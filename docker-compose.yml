services:
  calendar-sync:
    image: family-calendar-sync
    env_file: .env
    environment:
      - TOKEN_PATH=/app/token.json
      - HISTORY_DIR=/app/history
    volumes:
      - /Volume1/docker/family-calendar-briefing/token.json:/app/token.json
      - /Volume1/docker/family-calendar-briefing/history:/app/history
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - /Volume1/docker/family-calendar-briefing/html:/usr/share/nginx/html:ro
      - /Volume1/docker/family-calendar-briefing/history:/usr/share/nginx/html/history:ro
    ports:
      - "8090:80"
    restart: unless-stopped
